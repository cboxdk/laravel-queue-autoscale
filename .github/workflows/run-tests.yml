name: run-tests

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/run-tests.yml'
      - 'phpunit.xml.dist'
      - 'composer.json'
      - 'composer.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        php: [8.5, 8.4, 8.3]
        laravel: [13.*, 12.*]
        stability: [prefer-lowest, prefer-stable]
        include:
          - laravel: 13.*
            testbench: 11.*
          - laravel: 12.*
            testbench: 10.*
          # Laravel 11 is still supported by this package (see require in
          # composer.json), but cboxdk/laravel-telemetry needs illuminate
          # ^12/^13, so this leg drops the telemetry dev dependency before
          # installing and exercises the "telemetry not installed" path.
          - laravel: 11.*
            testbench: 9.*
            php: 8.3
            stability: prefer-stable
            os: ubuntu-latest
        exclude:
          # PHP 8.4/8.5 + prefer-lowest are excluded pending separate
          # verification; only the PHP 8.3 lowest-bound leg (L12.*) has been
          # confirmed to resolve cleanly since Laravel 11 was dropped from the
          # generated axis (`composer update --prefer-lowest --dry-run`,
          # verified 2026-07-06).
          - php: 8.5
            stability: prefer-lowest
          - php: 8.4
            stability: prefer-lowest
          # spatie/laravel-prometheus ^13.0 support requires PHP 8.4+
          - php: 8.3
            laravel: 13.*

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo, redis
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Remove telemetry integration (unsupported on Laravel 11)
        if: matrix.laravel == '11.*'
        run: composer remove --dev cboxdk/laravel-telemetry --no-update --no-interaction

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: List Installed Dependencies
        run: composer show -D

      - name: Execute tests
        run: vendor/bin/pest --ci --exclude-group=simulation
